name: deploy

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - "sdk/**"
      - "public/**"
      - "examples/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
    inputs:
      environment:
        description: "Deploy target"
        required: false
        default: "production"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools@latest deploy --only hosting:vbc-protocol --project vibraaltoai-11f55 --token "$FIREBASE_TOKEN" --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
